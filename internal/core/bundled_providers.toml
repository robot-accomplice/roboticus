# Bundled provider defaults — user config always takes precedence.

[providers.ollama]
url = "http://localhost:11434"
tier = "T1"
format = "openai"
chat_path = "/v1/chat/completions"
embedding_path = "/api/embed"
embedding_model = "nomic-embed-text"
embedding_dimensions = 768
is_local = true
cost_per_input_token = 0.0
cost_per_output_token = 0.0

[providers.sglang]
url = "http://localhost:30000"
tier = "T1"
format = "openai"
chat_path = "/v1/chat/completions"
is_local = true
cost_per_input_token = 0.0
cost_per_output_token = 0.0

[providers.vllm]
url = "http://localhost:8000"
tier = "T1"
format = "openai"
chat_path = "/v1/chat/completions"
is_local = true
cost_per_input_token = 0.0
cost_per_output_token = 0.0

[providers.docker-model-runner]
url = "http://localhost:12434"
tier = "T1"
format = "openai"
chat_path = "/v1/chat/completions"
is_local = true
cost_per_input_token = 0.0
cost_per_output_token = 0.0

[providers.openai]
url = "https://api.openai.com"
tier = "T3"
format = "openai"
chat_path = "/v1/chat/completions"
embedding_path = "/v1/embeddings"
embedding_model = "text-embedding-3-small"
embedding_dimensions = 1536
api_key_env = "OPENAI_API_KEY"
cost_per_input_token = 0.00003
cost_per_output_token = 0.00006

[providers.anthropic]
url = "https://api.anthropic.com"
tier = "T3"
format = "anthropic"
chat_path = "/v1/messages"
api_key_env = "ANTHROPIC_API_KEY"
auth_header = "x-api-key"
cost_per_input_token = 0.000015
cost_per_output_token = 0.000075

[providers.anthropic.extra_headers]
anthropic-version = "2023-06-01"

[providers.google]
url = "https://generativelanguage.googleapis.com"
tier = "T3"
format = "google"
embedding_path = "/v1beta/models/{model}:embedContent"
embedding_model = "text-embedding-004"
embedding_dimensions = 768
api_key_env = "GOOGLE_API_KEY"
cost_per_input_token = 0.0000025
cost_per_output_token = 0.00001

[providers.openrouter]
url = "https://openrouter.ai/api"
tier = "T2"
format = "openai"
chat_path = "/v1/chat/completions"
api_key_env = "OPENROUTER_API_KEY"
auth_header = "Authorization"
cost_per_input_token = 0.0
cost_per_output_token = 0.0

[providers.moonshot]
url = "https://api.moonshot.ai"
tier = "T2"
format = "openai"
chat_path = "/v1/chat/completions"
api_key_env = "MOONSHOT_API_KEY"
cost_per_input_token = 0.000001
cost_per_output_token = 0.000002

[providers.llama-cpp]
url = "http://localhost:8080"
tier = "T1"
format = "openai"
chat_path = "/v1/chat/completions"
is_local = true
cost_per_input_token = 0.0
cost_per_output_token = 0.0
