# ============================================================================
# Roboticus CI Pipeline
# ============================================================================
# Multi-stage workflow: lint -> test/fuzz/integration (parallel) -> build/security
# Pure-Go project with modernc.org/sqlite (no CGO required).
#
# Triggers on push/PR to develop and master.
# ============================================================================

name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancel in-progress runs for the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION_FILE: go.mod

jobs:
  # --------------------------------------------------------------------------
  # Stage 1: Lint
  # Runs go vet and golangci-lint. All subsequent jobs depend on this.
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  # --------------------------------------------------------------------------
  # Stage 2a: Unit Tests (matrix: linux + macOS)
  # Race detector enabled, coverage on linux only.
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Run unit tests with race detector
        run: go test -race -coverprofile=coverage.out -covermode=atomic -timeout 300s ./...

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

  # --------------------------------------------------------------------------
  # Stage 2b: Integration / Smoke Test
  # Boots a full API server against a temp DB and hits every endpoint.
  # --------------------------------------------------------------------------
  test-integration:
    name: Integration (Smoke)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Run smoke test
        run: go test -v -run TestLiveSmokeTest -timeout 120s .

  # --------------------------------------------------------------------------
  # Stage 2c: Fuzz Testing
  # Short fuzz run (10s per target) to catch panics and obvious crashes.
  # --------------------------------------------------------------------------
  fuzz:
    name: Fuzz
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: "Fuzz: InjectionDetector_CheckInput"
        run: go test -fuzz=FuzzInjectionDetector_CheckInput -fuzztime=10s ./internal/agent/

      - name: "Fuzz: InjectionDetector_Sanitize"
        run: go test -fuzz=FuzzInjectionDetector_Sanitize -fuzztime=10s ./internal/agent/

      - name: "Fuzz: TelegramFormatter"
        run: go test -fuzz=FuzzTelegramFormatter -fuzztime=10s ./internal/channel/

      - name: "Fuzz: SignalFormatter"
        run: go test -fuzz=FuzzSignalFormatter -fuzztime=10s ./internal/channel/

      - name: "Fuzz: WhatsAppFormatter"
        run: go test -fuzz=FuzzWhatsAppFormatter -fuzztime=10s ./internal/channel/

      - name: "Fuzz: ValidateE164"
        run: go test -fuzz=FuzzValidateE164 -fuzztime=10s ./internal/channel/

      - name: "Fuzz: IsValidCronExpression"
        run: go test -fuzz=FuzzIsValidCronExpression -fuzztime=10s ./internal/schedule/

      - name: "Fuzz: MatchesCron"
        run: go test -fuzz=FuzzMatchesCron -fuzztime=10s ./internal/schedule/

  # --------------------------------------------------------------------------
  # Stage 2d: Soak/Fuzz Battery
  # Deterministic soak loops + bounded fuzzing (reduced rounds for CI).
  # --------------------------------------------------------------------------
  soak-fuzz:
    name: Soak/Fuzz
    needs: [lint]
    runs-on: ubuntu-latest
    env:
      SOAK_ROUNDS: "2"
      FUZZ_SECONDS: "20"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Run soak/fuzz battery
        run: bash scripts/run-soak-fuzz.sh

  # --------------------------------------------------------------------------
  # Stage 2f: Architecture Constraints
  # Dedicated job so architecture drift is a visible, named check.
  # --------------------------------------------------------------------------
  architecture:
    name: Architecture
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Run architecture constraint tests
        run: go test -v -run TestArchitecture ./internal/api/

  # --------------------------------------------------------------------------
  # Stage 3a: Build Verification
  # Produces a statically-linked linux/amd64 binary to verify the build.
  # The real multi-platform build happens in release.yml.
  # --------------------------------------------------------------------------
  build:
    name: Build
    needs: [test, test-integration, fuzz, soak-fuzz, architecture]
    runs-on: ubuntu-latest
    env:
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Build linux/amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath \
            -ldflags="-s -w -X roboticus/cmd.version=ci-${COMMIT_SHA:0:8}" \
            -o roboticus .

      - name: Verify binary runs
        run: ./roboticus version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: roboticus-linux-amd64
          path: roboticus
          retention-days: 30

  # --------------------------------------------------------------------------
  # Stage 3b: Security / Vulnerability Scan
  # --------------------------------------------------------------------------
  security:
    name: Security (govulncheck)
    needs: [test, test-integration, fuzz, soak-fuzz, architecture]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
