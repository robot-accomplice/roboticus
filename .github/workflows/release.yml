# ============================================================================
# Roboticus Release Pipeline
# ============================================================================
# Triggered by pushing a version tag: v2025.04.02, v2025.04.02.1, etc.
# Builds cross-platform binaries, generates checksums, creates GitHub Release.
#
# Versioning: YYYY.MM.DD[.N]
#   v2025.04.02   — first release of the day
#   v2025.04.02.1 — same-day patch
#
# All binaries are statically linked (CGO_ENABLED=0, pure-Go SQLite).
# ============================================================================

name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write  # required to create GitHub Releases and upload assets

env:
  GO_VERSION_FILE: go.mod

jobs:
  # --------------------------------------------------------------------------
  # Gate: Run tests before building release artifacts.
  # Prevents shipping a broken tag.
  # --------------------------------------------------------------------------
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate release notes and changelog
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          RELEASE_NOTES="docs/releases/v${VERSION}-release-notes.md"

          [ -f "$RELEASE_NOTES" ] || {
            echo "missing required release notes: $RELEASE_NOTES" >&2
            exit 1
          }

          grep -Eq "^## \\[${VERSION//./\\.}\\]" CHANGELOG.md || {
            echo "missing required CHANGELOG.md section for ${VERSION}" >&2
            exit 1
          }

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector
        # Keep the release gate aligned with CI. v1.0.6 proved that a stale
        # 300s cap can fail the release pipeline even when the release branch's
        # current validated test posture needs materially more headroom.
        run: go test -race -timeout 20m ./...

      - name: Run smoke test
        run: go test -v -run TestLiveSmokeTest -timeout 120s .

      - name: Run architecture tests
        run: go test -v -run TestArchitecture ./internal/api/

  # --------------------------------------------------------------------------
  # Build: Cross-compile for all target platforms.
  # Uses a matrix to produce one artifact per GOOS/GOARCH pair.
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Extract version from tag
        id: version
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary and package
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Build the binary.
          BINARY_NAME="roboticus${SUFFIX}"
          go build -trimpath \
            -ldflags="-s -w -X roboticus/cmd.version=${BUILD_VERSION} -X roboticus/internal/daemon.version=${BUILD_VERSION}" \
            -o "${BINARY_NAME}" .

          # Raw binary for update-in-place (roboticus update binary).
          RAW_NAME="roboticus-${GOOS}-${GOARCH}${SUFFIX}"
          cp "${BINARY_NAME}" "${RAW_NAME}"

          # Archive for site installer (roboticus-VERSION-OS-ARCH.tar.gz/zip).
          # Use Go-native names to match site installer's arch mapping.
          ARCH_NAME="${GOARCH}"
          OS_NAME="${GOOS}"
          if [ "${GOOS}" = "windows" ]; then
            ARCHIVE="roboticus-${BUILD_VERSION}-${OS_NAME}-${ARCH_NAME}.zip"
            zip "${ARCHIVE}" "${BINARY_NAME}"
          else
            ARCHIVE="roboticus-${BUILD_VERSION}-${OS_NAME}-${ARCH_NAME}.tar.gz"
            tar czf "${ARCHIVE}" "${BINARY_NAME}"
          fi
          mkdir -p artifacts
          mv "${RAW_NAME}" "${ARCHIVE}" artifacts/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: roboticus-${{ matrix.goos }}-${{ matrix.goarch }}
          path: artifacts/
          retention-days: 7

  # --------------------------------------------------------------------------
  # Release: Collect all binaries, generate checksums, publish GitHub Release.
  # --------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for changelog generation

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: roboticus-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum roboticus-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Find the previous tag for changelog diff.
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -2 | tail -1)
          if [ -z "${PREV_TAG}" ] || [ "${PREV_TAG}" = "${TAG_NAME}" ]; then
            echo "body=Initial release." >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git log "${PREV_TAG}..${TAG_NAME}" --pretty=format:"- %s (%h)" --no-merges | head -50)
            # Write multiline output safely via delimiter.
            {
              echo "body<<CHANGELOG_EOF"
              echo "## Changes since ${PREV_TAG}"
              echo ""
              echo "${CHANGES}"
              echo ""
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Roboticus ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            dist/roboticus-*
            dist/SHA256SUMS.txt
            scripts/install.sh
            scripts/install.ps1
          fail_on_unmatched_files: false

      - name: Verify live release object and assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}")
          latest_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest")

          actual_tag=$(printf '%s' "$release_json" | jq -r '.tag_name')
          latest_tag=$(printf '%s' "$latest_json" | jq -r '.tag_name')
          [ "$actual_tag" = "$TAG_NAME" ] || {
            echo "release tag mismatch: expected $TAG_NAME got $actual_tag" >&2
            exit 1
          }
          [ "$latest_tag" = "$TAG_NAME" ] || {
            echo "latest release mismatch: expected $TAG_NAME got $latest_tag" >&2
            exit 1
          }

          asset_names=$(printf '%s' "$release_json" | jq -r '.assets[].name' | sort)
          printf '%s\n' "$asset_names"

          for required in \
            SHA256SUMS.txt \
            install.sh \
            install.ps1 \
            roboticus-linux-amd64 \
            roboticus-linux-arm64 \
            roboticus-darwin-amd64 \
            roboticus-darwin-arm64 \
            roboticus-windows-amd64.exe \
            "roboticus-${TAG_NAME#v}-linux-amd64.tar.gz" \
            "roboticus-${TAG_NAME#v}-linux-arm64.tar.gz" \
            "roboticus-${TAG_NAME#v}-darwin-amd64.tar.gz" \
            "roboticus-${TAG_NAME#v}-darwin-arm64.tar.gz" \
            "roboticus-${TAG_NAME#v}-windows-amd64.zip"
          do
            printf '%s\n' "$asset_names" | grep -Fx "$required" >/dev/null || {
              echo "missing published asset: $required" >&2
              exit 1
            }
          done

      - name: Prepare site-sync metadata
        id: site_meta
        run: |
          echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Trigger roboticus.ai release sync
        if: ${{ !contains(github.ref_name, '-rc') }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ROBOTICUS_SITE_DISPATCH_TOKEN }}
          repository: robot-accomplice/ironclad-site
          event-type: release-sync
          client-payload: |
            {
              "version": "${{ steps.site_meta.outputs.version }}",
              "date": "${{ steps.site_meta.outputs.date }}"
            }
