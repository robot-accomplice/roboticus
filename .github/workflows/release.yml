# ============================================================================
# Roboticus Release Pipeline
# ============================================================================
# Triggered by pushing a version tag: v2025.04.02, v2025.04.02.1, etc.
# Builds cross-platform binaries, generates checksums, creates/updates the
# GitHub Release, verifies the published release object, and reports the final
# release outcome.
#
# Required release secrets:
#   SITE_DISPATCH_PAT       PAT with access to robot-accomplice/roboticus-site
#
# Optional notification secrets; notifications are skipped if not configured:
#   SMTP_SERVER
#   SMTP_PORT
#   SMTP_USERNAME
#   SMTP_PASSWORD
#   RELEASE_NOTIFY_EMAIL
#   RELEASE_FROM_EMAIL
#   DISCORD_RELEASE_WEBHOOK
#
# Versioning: YYYY.MM.DD[.N]
#   v2025.04.02   — first release of the day
#   v2025.04.02.1 — same-day patch
#
# All binaries are statically linked (CGO_ENABLED=0, pure-Go SQLite).
# ============================================================================

name: Release
run-name: "Release / ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to execute against (for example v1.0.7)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  GO_VERSION_FILE: go.mod
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
  IS_PRERELEASE: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name, '-rc') }}

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Validate release notes and changelog
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          RELEASE_NOTES="docs/releases/v${VERSION}-release-notes.md"

          [ -f "$RELEASE_NOTES" ] || {
            echo "missing required release notes: $RELEASE_NOTES" >&2
            exit 1
          }

          grep -Eq "^## \\[${VERSION//./\\.}\\]" CHANGELOG.md || {
            echo "missing required CHANGELOG.md section for ${VERSION}" >&2
            exit 1
          }

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race -timeout 20m ./...

      - name: Run smoke test
        run: go test -v -run TestLiveSmokeTest -timeout 120s .

      - name: Run architecture tests
        run: go test -v -run TestArchitecture ./internal/api/

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Extract version from tag
        id: version
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary and package
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          BINARY_NAME="roboticus${SUFFIX}"
          go build -trimpath \
            -ldflags="-s -w -X roboticus/internal/version.Version=${BUILD_VERSION} -X roboticus/cmd/internal/cmdutil.Version=${BUILD_VERSION} -X roboticus/internal/daemon.version=${BUILD_VERSION}" \
            -o "${BINARY_NAME}" .

          RAW_NAME="roboticus-${GOOS}-${GOARCH}${SUFFIX}"
          cp "${BINARY_NAME}" "${RAW_NAME}"

          ARCH_NAME="${GOARCH}"
          OS_NAME="${GOOS}"
          if [ "${GOOS}" = "windows" ]; then
            ARCHIVE="roboticus-${BUILD_VERSION}-${OS_NAME}-${ARCH_NAME}.zip"
            zip "${ARCHIVE}" "${BINARY_NAME}"
          else
            ARCHIVE="roboticus-${BUILD_VERSION}-${OS_NAME}-${ARCH_NAME}.tar.gz"
            tar czf "${ARCHIVE}" "${BINARY_NAME}"
          fi

          mkdir -p artifacts
          mv "${RAW_NAME}" "${ARCHIVE}" artifacts/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: roboticus-${{ matrix.goos }}-${{ matrix.goarch }}
          path: artifacts/
          retention-days: 7

  release:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: roboticus-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum roboticus-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -2 | tail -1)
          if [ -z "${PREV_TAG}" ] || [ "${PREV_TAG}" = "${TAG_NAME}" ]; then
            echo "body=Initial release." >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git log "${PREV_TAG}..${TAG_NAME}" --pretty=format:"- %s (%h)" --no-merges | head -50)
            {
              echo "body<<CHANGELOG_EOF"
              echo "## Changes since ${PREV_TAG}"
              echo ""
              echo "${CHANGES}"
              echo ""
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="Roboticus ${TAG_NAME}"
          notes_file="$(mktemp)"
          printf '%s\n' "${{ steps.changelog.outputs.body }}" > "${notes_file}"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            if [ "${IS_PRERELEASE}" = "true" ]; then
              gh release edit "${TAG_NAME}" \
                --verify-tag \
                --title "${title}" \
                --notes-file "${notes_file}" \
                --prerelease
            else
              gh release edit "${TAG_NAME}" \
                --verify-tag \
                --title "${title}" \
                --notes-file "${notes_file}" \
                --latest
            fi
          else
            if [ "${IS_PRERELEASE}" = "true" ]; then
              gh release create "${TAG_NAME}" \
                --verify-tag \
                --title "${title}" \
                --notes-file "${notes_file}" \
                --prerelease \
                --latest=false
            else
              gh release create "${TAG_NAME}" \
                --verify-tag \
                --title "${title}" \
                --notes-file "${notes_file}" \
                --latest
            fi
          fi

          gh release upload "${TAG_NAME}" \
            dist/roboticus-* \
            dist/SHA256SUMS.txt \
            scripts/install.sh \
            scripts/install.ps1 \
            --clobber

      - name: Verify live release object and assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}")
          actual_tag=$(printf '%s' "$release_json" | jq -r '.tag_name')
          [ "$actual_tag" = "$TAG_NAME" ] || {
            echo "release tag mismatch: expected $TAG_NAME got $actual_tag" >&2
            exit 1
          }

          if [ "${IS_PRERELEASE}" != "true" ]; then
            latest_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest")
            latest_tag=$(printf '%s' "$latest_json" | jq -r '.tag_name')
            [ "$latest_tag" = "$TAG_NAME" ] || {
              echo "latest release mismatch: expected $TAG_NAME got $latest_tag" >&2
              exit 1
            }
          fi

          asset_names=$(printf '%s' "$release_json" | jq -r '.assets[].name' | sort)
          printf '%s\n' "$asset_names"

          for required in \
            SHA256SUMS.txt \
            install.sh \
            install.ps1 \
            roboticus-linux-amd64 \
            roboticus-linux-arm64 \
            roboticus-darwin-amd64 \
            roboticus-darwin-arm64 \
            roboticus-windows-amd64.exe \
            "roboticus-${TAG_NAME#v}-linux-amd64.tar.gz" \
            "roboticus-${TAG_NAME#v}-linux-arm64.tar.gz" \
            "roboticus-${TAG_NAME#v}-darwin-amd64.tar.gz" \
            "roboticus-${TAG_NAME#v}-darwin-arm64.tar.gz" \
            "roboticus-${TAG_NAME#v}-windows-amd64.zip"
          do
            printf '%s\n' "$asset_names" | grep -Fx "$required" >/dev/null || {
              echo "missing published asset: $required" >&2
              exit 1
            }
          done

      - name: Prepare site-sync metadata
        id: site_meta
        run: |
          echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Trigger roboticus.ai release sync
        if: ${{ env.IS_PRERELEASE != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.SITE_DISPATCH_PAT }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/robot-accomplice/roboticus-site/dispatches" \
            -f event_type=release-sync \
            -F client_payload[version]='${{ steps.site_meta.outputs.version }}' \
            -F client_payload[date]='${{ steps.site_meta.outputs.date }}'

  notify:
    name: Release Report
    needs: [test, build, release]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Determine stage status
        id: stage_status
        env:
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
        run: |
          if [ "${TEST_RESULT}" = "success" ] && \
             [ "${BUILD_RESULT}" = "success" ] && \
             [ "${RELEASE_RESULT}" = "success" ]; then
            echo "workflow_outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_outcome=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Self-evaluate release truth
        id: audit
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["TAG_NAME"]
          is_prerelease = os.environ.get("IS_PRERELEASE") == "true"
          stage_results = {
              "test": os.environ["TEST_RESULT"],
              "build": os.environ["BUILD_RESULT"],
              "release": os.environ["RELEASE_RESULT"],
          }
          required_assets = [
              "SHA256SUMS.txt",
              "install.sh",
              "install.ps1",
              "roboticus-linux-amd64",
              "roboticus-linux-arm64",
              "roboticus-darwin-amd64",
              "roboticus-darwin-arm64",
              "roboticus-windows-amd64.exe",
              f"roboticus-{tag[1:]}-linux-amd64.tar.gz",
              f"roboticus-{tag[1:]}-linux-arm64.tar.gz",
              f"roboticus-{tag[1:]}-darwin-amd64.tar.gz",
              f"roboticus-{tag[1:]}-darwin-arm64.tar.gz",
              f"roboticus-{tag[1:]}-windows-amd64.zip",
          ]

          outcome = "success"
          findings = []
          release_url = f"https://github.com/{repo}/releases/tag/{tag}"

          for stage, result in stage_results.items():
              if result != "success":
                  outcome = "failure"
                  findings.append(f"stage {stage}={result}")

          release_json = None
          if outcome == "success":
              try:
                  release_json = json.loads(
                      subprocess.check_output(
                          ["gh", "api", f"repos/{repo}/releases/tags/{tag}"],
                          text=True,
                      )
                  )
                  release_url = release_json.get("html_url") or release_url
              except subprocess.CalledProcessError:
                  outcome = "failure"
                  findings.append(f"release object for {tag} is missing")

          if release_json is not None:
              if release_json.get("tag_name") != tag:
                  outcome = "failure"
                  findings.append(
                      f"release tag mismatch: {release_json.get('tag_name')} != {tag}"
                  )

              assets = sorted(asset["name"] for asset in release_json.get("assets", []))
              missing = [name for name in required_assets if name not in assets]
              if missing:
                  outcome = "failure"
                  findings.append("missing assets: " + ", ".join(missing))

              if not is_prerelease:
                  try:
                      latest = json.loads(
                          subprocess.check_output(
                              ["gh", "api", f"repos/{repo}/releases/latest"],
                              text=True,
                          )
                      )
                      if latest.get("tag_name") != tag:
                          outcome = "failure"
                          findings.append(
                              f"latest release mismatch: {latest.get('tag_name')} != {tag}"
                          )
                  except subprocess.CalledProcessError:
                      outcome = "failure"
                      findings.append("latest release lookup failed")

          summary = (
              "All required release stages executed and the published release object matches the requested tag."
              if outcome == "success"
              else "; ".join(findings)
          )

          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"audit_outcome={outcome}\n")
              fh.write(f"release_url={release_url}\n")
              fh.write("audit_summary<<AUDIT_EOF\n")
              fh.write(summary + "\n")
              fh.write("AUDIT_EOF\n")
          PY

      - name: Send release report email
        if: env.SMTP_SERVER != '' && env.RELEASE_NOTIFY_EMAIL != ''
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RELEASE_NOTIFY_EMAIL: ${{ secrets.RELEASE_NOTIFY_EMAIL }}
          RELEASE_FROM_EMAIL: ${{ secrets.RELEASE_FROM_EMAIL }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
          AUDIT_OUTCOME: ${{ steps.audit.outputs.audit_outcome }}
          AUDIT_SUMMARY: ${{ steps.audit.outputs.audit_summary }}
          RELEASE_URL: ${{ steps.audit.outputs.release_url }}
        run: |
          python3 - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage

          server = os.environ.get("SMTP_SERVER", "").strip()
          to_addr = os.environ.get("RELEASE_NOTIFY_EMAIL", "").strip()
          if not server or not to_addr:
              raise SystemExit("SMTP or recipient not configured for release notification")

          tag = os.environ["TAG_NAME"]
          outcome = os.environ.get("AUDIT_OUTCOME", "failure")
          emoji = "✅" if outcome == "success" else "❌"
          release_url = os.environ.get("RELEASE_URL", "")
          workflow_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          sender = os.environ.get("RELEASE_FROM_EMAIL", "").strip() or "Roboticus CI <ci@roboticus.ai>"
          port = int((os.environ.get("SMTP_PORT") or "587").strip())
          username = os.environ.get("SMTP_USERNAME", "").strip()
          password = os.environ.get("SMTP_PASSWORD", "")

          html = f"""
          <html><body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #24292f;">
          <h2>{emoji} Roboticus {tag} release {outcome}</h2>
          <p>{os.environ.get('AUDIT_SUMMARY', '').strip()}</p>
          <table style="border-collapse: collapse;">
            <tr><td style="padding: 6px 10px; border: 1px solid #d0d7de;"><strong>Pre-release Tests</strong></td><td style="padding: 6px 10px; border: 1px solid #d0d7de;">{os.environ.get('TEST_RESULT')}</td></tr>
            <tr><td style="padding: 6px 10px; border: 1px solid #d0d7de;"><strong>Build Matrix</strong></td><td style="padding: 6px 10px; border: 1px solid #d0d7de;">{os.environ.get('BUILD_RESULT')}</td></tr>
            <tr><td style="padding: 6px 10px; border: 1px solid #d0d7de;"><strong>Publish Release</strong></td><td style="padding: 6px 10px; border: 1px solid #d0d7de;">{os.environ.get('RELEASE_RESULT')}</td></tr>
            <tr><td style="padding: 6px 10px; border: 1px solid #d0d7de;"><strong>Self-Evaluation</strong></td><td style="padding: 6px 10px; border: 1px solid #d0d7de;">{outcome}</td></tr>
          </table>
          <p><a href="{release_url}">View Release</a> · <a href="{workflow_url}">View Workflow Run</a></p>
          </body></html>
          """

          msg = EmailMessage()
          msg["Subject"] = f"{emoji} Roboticus {tag} release {outcome}"
          msg["From"] = sender
          msg["To"] = to_addr
          msg.set_content(os.environ.get("AUDIT_SUMMARY", "").strip())
          msg.add_alternative(html, subtype="html")

          if port == 465:
              smtp = smtplib.SMTP_SSL(server, port, timeout=30)
          else:
              smtp = smtplib.SMTP(server, port, timeout=30)
          try:
              smtp.ehlo()
              if port != 465:
                  smtp.starttls()
                  smtp.ehlo()
              if username:
                  smtp.login(username, password)
              smtp.send_message(msg)
          finally:
              smtp.quit()
          PY

      - name: Send Discord release report
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
          AUDIT_OUTCOME: ${{ steps.audit.outputs.audit_outcome }}
          AUDIT_SUMMARY: ${{ steps.audit.outputs.audit_summary }}
          RELEASE_URL: ${{ steps.audit.outputs.release_url }}
        run: |
          set -euo pipefail
          color=$( [ "${AUDIT_OUTCOME}" = "success" ] && echo "3066993" || echo "15158332" )
          emoji=$( [ "${AUDIT_OUTCOME}" = "success" ] && echo "✅" || echo "❌" )
          payload=$(jq -n \
            --arg title "${emoji} Roboticus ${TAG_NAME} release ${AUDIT_OUTCOME}" \
            --arg desc "${AUDIT_SUMMARY}" \
            --arg url "${RELEASE_URL}" \
            --arg run_url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg test "${TEST_RESULT}" \
            --arg build "${BUILD_RESULT}" \
            --arg release "${RELEASE_RESULT}" \
            --arg audit "${AUDIT_OUTCOME}" \
            --argjson color "$color" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                url: $url,
                fields: [
                  { name: "Pre-release Tests", value: $test, inline: true },
                  { name: "Build Matrix", value: $build, inline: true },
                  { name: "Publish Release", value: $release, inline: true },
                  { name: "Self-Evaluation", value: $audit, inline: true }
                ],
                footer: { text: $run_url },
                timestamp: (now | todate)
              }]
            }')

          curl -fsSL -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK"

      - name: Post workflow summary
        env:
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
          AUDIT_OUTCOME: ${{ steps.audit.outputs.audit_outcome }}
          AUDIT_SUMMARY: ${{ steps.audit.outputs.audit_summary }}
          RELEASE_URL: ${{ steps.audit.outputs.release_url }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release report for ${TAG_NAME}

          | Stage | Result |
          |-------|--------|
          | Pre-release Tests | ${TEST_RESULT} |
          | Build Matrix | ${BUILD_RESULT} |
          | Publish Release | ${RELEASE_RESULT} |
          | Self-Evaluation | ${AUDIT_OUTCOME} |

          ${AUDIT_SUMMARY}

          - [Release](${RELEASE_URL})
          - [Workflow Run](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})
          EOF
